<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат - Школа без Буллинга</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { 
            color: #333; 
            text-align: center; 
            margin-bottom: 20px;
        }
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 10px;
        }
        .student-message {
            align-self: flex-end;
            background: #e3f2fd;
            border-bottom-right-radius: 5px;
        }
        .psychologist-message {
            align-self: flex-start;
            background: #f3e5f5;
            border-bottom-left-radius: 5px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
        }
        .chat-send-btn {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .token-display {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status-indicator {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
        }
        .status-new { background: #e3f2fd; color: #1565c0; }
        .status-in-progress { background: #fff3e0; color: #f57c00; }
        .status-resolved { background: #e8f5e9; color: #2e7d32; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body>
    <div class="container">
        <h1>Чат с психологом</h1>
        
        <div class="token-display">
            Ваш токен: <strong id="token-display">Загрузка...</strong>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Введите ваше сообщение...">
                <button class="chat-send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
        
        <div style="margin-top: 15px; text-align: center;">
            <div>Статус обращения: <span class="status-indicator status-new" id="status-indicator">Загрузка...</span></div>
        </div>
    </div>

    <div style="margin-top: 20px; text-align: center; padding-top: 15px; border-top: 1px solid #eee;">
        <a href="/" style="display: inline-block; margin: 0 10px; padding: 8px 16px; background: #4CAF50; color: white; text-decoration: none; border-radius: 4px;">Главная</a>
        <a href="/about" style="display: inline-block; margin: 0 10px; padding: 8px 16px; background: #2196F3; color: white; text-decoration: none; border-radius: 4px;">О проекте</a>
        <a href="/resources" style="display: inline-block; margin: 0 10px; padding: 8px 16px; background: #FF9800; color: white; text-decoration: none; border-radius: 4px;">Ресурсы</a>
        <a href="/faq" style="display: inline-block; margin: 0 10px; padding: 8px 16px; background: #9C27B0; color: white; text-decoration: none; border-radius: 4px;">FAQ</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');

        if (!token) {
            const pathParts = window.location.pathname.split('/');
            if (pathParts.length > 2) {
                token = pathParts[pathParts.length - 1];
            }
        }

        if (!token) {
            document.getElementById('token-display').textContent = 'Токен не найден';
            document.getElementById('chat-messages').innerHTML = '<div>Пожалуйста, укажите токен в URL (например: ?token=abc123)</div>';
        } else {
            document.getElementById('token-display').textContent = token;
            loadChatHistory();
        }
        
        function getParameterByName(name, url = window.location.href) {
            const regex = /[?&]([^=#]+)=([^&#]*)/g;
            let params = {};
            let match;
            while (match = regex.exec(url)) {
                params[decodeURIComponent(match[1])] = decodeURIComponent(match[2]);
            }
            return params[name];
        }
        
        async function loadChatHistory() {
            try {
                const response = await fetch('/api/chat/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token
                    })
                });

                const data = await response.json();

                if (data.messages) {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';

                    data.messages.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message ${msg.role}-message`;
                        messageDiv.textContent = msg.text;
                        messagesContainer.appendChild(messageDiv);
                    });

                    messagesContainer.scrollTop = messagesContainer.scrollHeight;

                    updateStatusIndicator();
                } else {
                    document.getElementById('chat-messages').innerHTML = '<div>' + data.detail + '</div>';
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
                document.getElementById('chat-messages').innerHTML = '<div>Ошибка загрузки истории чата</div>';
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        message: message
                    })
                });

                if (response.ok) {
                    loadChatHistory();
                    input.value = '';
                } else {
                    const errorData = await response.json();
                    alert('Ошибка при отправке сообщения: ' + (errorData.detail || 'Неизвестная ошибка'));
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Ошибка при отправке сообщения');
            }
        }
        
        function updateStatusIndicator() {
            document.getElementById('status-indicator').textContent = 'В обработке';
            document.getElementById('status-indicator').className = 'status-indicator status-in-progress';
        }
        
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
